services:
  qforge_app:
    build:
      context: .
      dockerfile: ./build/php/Dockerfile
      args:
        PROJECT_PATH: ${PROJECT_PATH}
        PHP_FPM_VERSION: ${PHP_FPM_VERSION}
        USERID: ${USERID}
    container_name: ${CONTAINER_NAME_PREFIX}app
    working_dir: ${PROJECT_PATH}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./code:${PROJECT_PATH}
      - ./build/php/conf.d/local.ini:/usr/local/etc/php/conf.d/local.ini
      - ./build/php/php-fpm.d/www.conf:/usr/local/etc/php-fpm.d/www.conf
    depends_on:
      - qforge_db
      - qforge_redis
      - qforge_python
    networks:
      - local

  qforge_worker:
    build:
      context: .
      dockerfile: ./build/worker/Dockerfile
      args:
        PROJECT_PATH: ${PROJECT_PATH}
        PHP_FPM_VERSION: ${PHP_FPM_VERSION}
        USERID: ${USERID}
    container_name: ${CONTAINER_NAME_PREFIX}worker
    working_dir: ${PROJECT_PATH}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./code:${PROJECT_PATH}
      - ./build/worker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    depends_on:
      - qforge_app
      - qforge_redis
    networks:
      - local

  qforge_web:
    image: nginx:alpine
    container_name: ${CONTAINER_NAME_PREFIX}web
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./code:${PROJECT_PATH}
      - ./build/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./build/nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf
      - ./build/nginx/log:/var/log/nginx
    depends_on:
      - qforge_app
      - qforge_frontend
    networks:
      - local

  qforge_frontend:
    build:
      context: ./frontend
      dockerfile: ../build/frontend/Dockerfile
    container_name: ${CONTAINER_NAME_PREFIX}frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PORT=5173
      - VITE_API_BASE_URL=http://localhost:${NGINX_HTTP_PORT}/api
    networks:
      - local

  qforge_python:
    build:
      context: ./python-service
      dockerfile: ../build/python/Dockerfile
    container_name: ${CONTAINER_NAME_PREFIX}python
    restart: unless-stopped
    working_dir: /app
    ports:
      - "${PYTHON_PORT}:8000"
    volumes:
      - ./python-service:/app
      - ./code/storage/app:/shared-storage
    environment:
      - PYTHONUNBUFFERED=1
      # M5: local LLM for AI bank expansion. Frontend → Laravel → Python → Ollama.
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://qforge_ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b-instruct}
      # M6: embedding model for /embed (RAG). Same Ollama, different model.
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - LLM_DEBUG=${LLM_DEBUG:-false}
    depends_on:
      - qforge_ollama
    networks:
      - local

  qforge_ollama:
    image: ollama/ollama
    container_name: ${CONTAINER_NAME_PREFIX}ollama
    restart: unless-stopped
    # Custom entrypoint: start `ollama serve`, then pull the model once into the
    # named volume so `docker compose up` is demo-ready without a manual pull.
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b-instruct}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    volumes:
      - qforge_ollama_data:/root/.ollama
      - ./build/ollama/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - local

  # M6 (RAG): vector index for embeddings. An INDEX, not a database — MySQL stays
  # the source of truth and `artisan qforge:rag:reindex` can rebuild this from
  # scratch. Only Laravel talks to it (REST, port 6333), like Redis.
  qforge_qdrant:
    image: qdrant/qdrant:latest
    container_name: ${CONTAINER_NAME_PREFIX}qdrant
    restart: unless-stopped
    ports:
      # Host access for the built-in dashboard: http://localhost:6333/dashboard
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qforge_qdrant_data:/qdrant/storage
    networks:
      - local

  qforge_db:
    image: mysql:${MYSQL_VERSION}
    container_name: ${CONTAINER_NAME_PREFIX}db
    restart: unless-stopped
    ports:
      - "${HOST_DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_USER_PASSWORD}
    volumes:
      - qforge_db_data:/var/lib/mysql
      - ./build/mysql/my.cnf:/etc/mysql/my.cnf
      - ./build/mysql/init/createuser.sh:/docker-entrypoint-initdb.d/10-createuser.sh
    networks:
      - local

  qforge_redis:
    image: redis:alpine
    container_name: ${CONTAINER_NAME_PREFIX}redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT}:6379"
    volumes:
      - ./build/data/redis:/data
    networks:
      - local

  qforge_mailpit:
    image: axllent/mailpit:latest
    container_name: ${CONTAINER_NAME_PREFIX}mailpit
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILPIT_PORT}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD_PORT}:8025"
    networks:
      - local

networks:
  local:
    name: ${NETWORK}

volumes:
  qforge_db_data:
    name: ${CONTAINER_NAME_PREFIX}db
  qforge_ollama_data:
    name: ${CONTAINER_NAME_PREFIX}ollama
  qforge_qdrant_data:
    name: ${CONTAINER_NAME_PREFIX}qdrant
